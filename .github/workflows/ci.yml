name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run tests
        run: pytest -v --tb=short

      - name: Verify C BitWriter compiles
        run: |
          python -c "
          from torch_aac.cpu._bitwriter_native import is_available
          assert is_available(), 'C BitWriter failed to compile'
          print('C BitWriter: OK')
          "

  encode-smoke:
    name: Encode Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.12-${{ hashFiles('pyproject.toml') }}

      - name: Install
        run: |
          pip install -e ".[dev]"
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Encode → FFmpeg decode roundtrip
        run: |
          python -c "
          import numpy as np, subprocess, tempfile
          from pathlib import Path
          import torch_aac

          sr = 48000
          pcm = (0.5 * np.sin(2*np.pi*1000*np.arange(sr)/sr)).astype(np.float32)
          aac = torch_aac.encode(pcm, sample_rate=sr, bitrate=128000)
          print(f'Encoded: {len(aac)} bytes')

          with tempfile.NamedTemporaryFile(suffix='.aac', delete=False) as f:
              f.write(aac); p = f.name
          r = subprocess.run(
              ['ffmpeg', '-y', '-v', 'error', '-i', p,
               '-f', 'f32le', '-ar', str(sr), '-ac', '1', 'pipe:1'],
              capture_output=True)
          Path(p).unlink()
          assert r.returncode == 0, f'FFmpeg decode failed: {r.stderr.decode()[:200]}'

          d = np.frombuffer(r.stdout, dtype=np.float32)
          ratio = np.abs(d).max() / 0.5
          print(f'Decoded: {len(d)} samples, peak ratio: {ratio:.4f}')
          assert 0.9 < ratio < 1.1, f'Amplitude ratio out of range: {ratio}'
          print('Smoke test PASSED')
          "

      - name: Differentiable mode gradient check
        run: |
          python -c "
          import torch
          from torch_aac import DifferentiableAAC

          codec = DifferentiableAAC(sample_rate=48000, bitrate=128000)
          x = torch.randn(4096, requires_grad=True)
          y = codec(x)
          loss = y.pow(2).mean()
          loss.backward()
          assert x.grad is not None, 'No gradient'
          assert not x.grad.isnan().any(), 'NaN gradients'
          assert x.grad.norm() > 0, 'Zero gradient'
          print(f'Gradient norm: {x.grad.norm().item():.4f}')
          print('Differentiable mode PASSED')
          "

      - name: Batch encode check
        run: |
          python -c "
          import numpy as np
          import torch_aac

          streams = [np.random.randn(48000).astype(np.float32) for _ in range(4)]
          results = torch_aac.encode_batch(streams, sample_rate=48000, bitrate=128000)
          assert len(results) == 4
          assert all(len(r) > 0 for r in results)
          print(f'Batch encode: 4 streams, sizes: {[len(r) for r in results]}')
          print('Batch encode PASSED')
          "
